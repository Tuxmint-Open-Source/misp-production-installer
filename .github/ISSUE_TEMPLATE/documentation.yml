name: Documentation improvement
description: Report unclear, missing, or inconsistent documentation
title: "Docs: "
labels: ["type: docs"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for improving the MISP Docker Lifecycle Manager documentation.

        Please do not include private deployment details, internal hostnames/IPs, credentials, raw logs, screenshots with sensitive information, or generated configuration.
  - type: input
    id: page
    attributes:
      label: Documentation page
      description: Which page or section should be improved?
      placeholder: "docs/operator-guide.md"
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is unclear or missing?
      description: Describe the problem from a reader/operator perspective.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: Optional wording, structure, or link suggestions.
    validations:
      required: false
  - type: dropdown
    id: reader
    attributes:
      label: Reader type
      options:
        - New evaluator
        - First-time installer
        - Day-2 operator
        - Contributor
        - Security reviewer
        - Other
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Public-safety confirmation
      options:
        - label: I did not include secrets, private deployment details, raw logs, or sensitive screenshots.
          required: true
