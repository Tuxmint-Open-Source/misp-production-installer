name: Bug report
description: Report a reproducible problem with MISP Docker Lifecycle Manager
title: "Bug: "
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem.

        This is a public repository. Do not include secrets, `.env` contents, private hostnames/IPs, internal topology, raw logs, database dumps, backup contents, generated configuration archives, or screenshots with private details. Replace sensitive values with `[REDACTED]` and use examples such as `misp.example.com` and `/opt/misp-docker`.

        For reproducible reports, use the anonymous SOS report guide: https://github.com/Tuxmint-Open-Source/misp-docker-lifecycle-manager/blob/main/docs/sos-report.md

        If this may be a security vulnerability, or if you cannot explain the issue without sensitive deployment details, do not file a public issue. Use the repository security reporting path instead.
  - type: input
    id: version
    attributes:
      label: Manager version or commit
      description: Output of `./lifecycle/install.sh --version`, a release tag, or a commit SHA.
      placeholder: "v1.3.1, v1.3.0, or commit SHA"
    validations:
      required: true
  - type: dropdown
    id: workflow
    attributes:
      label: Affected workflow
      options:
        - Fresh install
        - Update
        - Backup
        - Restore
        - Rollback
        - Reset/removal
        - Doctor/status
        - Login check
        - Monitoring healthcheck
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: sos_report
    attributes:
      label: Anonymous SOS report
      description: Paste the reviewed public-safe SOS report from docs/sos-report.md. Do not paste raw logs, .env contents, generated config, database dumps, backup contents, real hostnames/IPs, or screenshots with private details.
      placeholder: |
        # MISP Docker Lifecycle Manager SOS Report

        ## Safety confirmation
        I reviewed this report before posting and removed secrets, credentials, private hostnames/IPs, internal topology, raw logs, database dumps, backup contents, generated configuration, and deployment-specific data.

        ## Summary
        - Manager version/ref: v1.3.1, v1.3.0, or commit SHA
        - Report format: manual-sos-v1
        - Affected workflow: install | update | backup | restore | rollback | reset | doctor | status | login-check | documentation | other
        - Reproducible on a fresh install: yes | no | unknown
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Keep output sanitized. Do not paste raw logs.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the sanitized command shape and steps needed to reproduce.
      placeholder: |
        1. Run `sudo ./lifecycle/install.sh --install-dir /opt/misp-docker --base-url https://misp.example.com ...`
        2. Run `sudo ./lifecycle/doctor.sh --install-dir /opt/misp-docker`
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Public-safe environment details only.
      placeholder: |
        OS: Rocky Linux 9
        Docker version: ...
        Exposure mode: reverse-proxy
        Upstream ref/component tags: ...
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Public-safety confirmation
      options:
        - label: I reviewed the report before posting and removed secrets, passwords, tokens, `.env` contents, private hostnames/IPs, internal topology, raw logs, database dumps, backup contents, generated configuration, and screenshots with private details.
          required: true
        - label: If this may be a security vulnerability or cannot be explained safely in public, I will use the private security reporting path instead.
          required: true
