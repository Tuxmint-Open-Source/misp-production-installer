name: Bug report
description: Report a reproducible problem with MISP Docker Lifecycle Manager
title: "Bug: "
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem.

        This is a public repository. Do not include secrets, `.env` contents, private hostnames/IPs, internal topology, raw logs, database dumps, or backup contents. Replace sensitive values with `[REDACTED]` and use examples such as `misp.example.com` and `/opt/misp-docker`.

        If this may be a security vulnerability, do not file a public issue. Use the repository security reporting path instead.
  - type: input
    id: version
    attributes:
      label: Manager version or commit
      description: Output of `./installer/install.sh --version`, a release tag, or a commit SHA.
      placeholder: "misp-docker-lifecycle-manager 1.0.0-rc.2"
    validations:
      required: true
  - type: dropdown
    id: workflow
    attributes:
      label: Affected workflow
      options:
        - Fresh install
        - Update
        - Backup
        - Restore
        - Rollback
        - Reset/removal
        - Doctor/status
        - Login check
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Keep output sanitized.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the sanitized command shape and steps needed to reproduce.
      placeholder: |
        1. Run `sudo ./installer/install.sh --install-dir /opt/misp-docker --base-url https://misp.example.com ...`
        2. Run `sudo ./installer/doctor.sh --install-dir /opt/misp-docker`
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Public-safe environment details only.
      placeholder: |
        OS: Rocky Linux 9
        Docker version: ...
        Exposure mode: reverse-proxy
        Upstream ref/component tags: ...
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Public-safety confirmation
      options:
        - label: I removed secrets, passwords, tokens, `.env` contents, private hostnames/IPs, raw logs, database dumps, and backup contents.
          required: true
