version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:20"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    labels:
      - "type: maintenance"
      - "area: github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"
