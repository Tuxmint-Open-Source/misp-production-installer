name: ShellCheck

on:
  pull_request:
    paths:
      - ".github/workflows/shellcheck.yml"
      - "installer/**/*.sh"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/shellcheck.yml"
      - "installer/**/*.sh"
  schedule:
    # Weekly, offset from other scheduled checks.
    - cron: "29 4 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck installer scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        # actions/checkout@v7
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38
        with:
          scandir: ./installer
          format: gcc
