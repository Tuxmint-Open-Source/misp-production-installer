name: ShellCheck

on:
  pull_request:
    paths:
      - ".github/workflows/shellcheck.yml"
      - ".github/scripts/run-shellcheck.sh"
      - "lifecycle/**/*.sh"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/shellcheck.yml"
      - ".github/scripts/run-shellcheck.sh"
      - "lifecycle/**/*.sh"
  schedule:
    # Weekly, offset from other scheduled checks.
    - cron: "29 4 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck lifecycle scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        # actions/checkout@v7
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Download, verify, and run ShellCheck
        run: .github/scripts/run-shellcheck.sh
