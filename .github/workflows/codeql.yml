name: CodeQL

on:
  pull_request:
    paths:
      - ".github/workflows/codeql.yml"
      - "scripts/**/*.py"
      - "tests/**/*.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/codeql.yml"
      - "scripts/**/*.py"
      - "tests/**/*.py"
  schedule:
    # Weekly, intentionally offset from other scheduled workflows.
    - cron: "41 4 * * 2"
  workflow_dispatch:

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        # actions/checkout@v7
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Initialize CodeQL
        # github/codeql-action@v4
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          languages: python
          queries: security-extended

      - name: Perform CodeQL analysis
        # github/codeql-action@v4
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
